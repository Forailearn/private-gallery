<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Gallery</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}

.loginPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.loginBox{
    background:#1b1b1b;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.title{
    text-align:center;
    font-size:32px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#888;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    background:#2b2b2b;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ff3b5c;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.gallery{
    display:none;
    padding:20px;
}

.topbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.uploadInput{
    flex:1;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#1b1b1b;
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

.deleteBtn{
    border-radius:0;
    background:#ff2d55;
}

.empty{
    color:#777;
    text-align:center;
    margin-top:100px;
    font-size:20px;
}

</style>
</head>
<body>

<div class="loginPage" id="loginPage">

    <div class="loginBox">

        <div class="title">
            Private Gallery
        </div>

        <div class="subtitle">
            輸入通關密碼
        </div>

        <input 
            type="password" 
            id="passwordInput"
            placeholder="Password"
        >

        <button onclick="login()">
            進入相簿
        </button>

    </div>

</div>

<div class="gallery" id="galleryPage">

    <h1>Private Gallery</h1>

    <div class="topbar">

        <input 
            class="uploadInput"
            type="file" 
            id="fileInput"
            accept="image/*"
            multiple
        >

        <button onclick="uploadImages()">
            上傳圖片
        </button>

    </div>

    <div class="grid" id="galleryGrid"></div>

    <div class="empty" id="emptyText">
        尚未上傳圖片
    </div>

</div>

<script>

// ===== 通關密碼 =====
const PASSWORD = "9872376832";

// ===== 登入 =====
function login(){

    const input = document
        .getElementById("passwordInput")
        .value;

    if(input === PASSWORD){

        sessionStorage.setItem("galleryLogin","true");

        document
            .getElementById("loginPage")
            .style.display = "none";

        document
            .getElementById("galleryPage")
            .style.display = "block";

        loadGallery();

    }else{

        alert("密碼錯誤");

    }

}

// ===== 已登入 =====
if(sessionStorage.getItem("galleryLogin") === "true"){

    window.onload = () => {

        document
            .getElementById("loginPage")
            .style.display = "none";

        document
            .getElementById("galleryPage")
            .style.display = "block";

        loadGallery();

    }

}

// ===== 上傳圖片 =====
function uploadImages(){

    const files = document
        .getElementById("fileInput")
        .files;

    if(files.length === 0){
        alert("請選擇圖片");
        return;
    }

    let images = JSON.parse(
        localStorage.getItem("galleryImages")
    ) || [];

    let loaded = 0;

    for(let file of files){

        const reader = new FileReader();

        reader.onload = function(e){

            images.unshift(e.target.result);

            loaded++;

            if(loaded === files.length){

                localStorage.setItem(
                    "galleryImages",
                    JSON.stringify(images)
                );

                loadGallery();

            }

        }

        reader.readAsDataURL(file);

    }

}

// ===== 載入圖片 =====
function loadGallery(){

    const grid = document
        .getElementById("galleryGrid");

    const empty = document
        .getElementById("emptyText");

    grid.innerHTML = "";

    let images = JSON.parse(
        localStorage.getItem("galleryImages")
    ) || [];

    if(images.length === 0){

        empty.style.display = "block";

    }else{

        empty.style.display = "none";

    }

    images.forEach((img,index)=>{

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
        
            <img src="${img}">

            <button 
                class="deleteBtn"
                onclick="deleteImage(${index})"
            >
                刪除
            </button>

        `;

        grid.appendChild(card);

    });

}

// ===== 刪除 =====
function deleteImage(index){

    let images = JSON.parse(
        localStorage.getItem("galleryImages")
    ) || [];

    images.splice(index,1);

    localStorage.setItem(
        "galleryImages",
        JSON.stringify(images)
    );

    loadGallery();

}

</script>

</body>
</html>
