<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Gallery</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input,
select{
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    font-size:16px;
}

.gallery{
    display:none;
    padding:20px;
}

.topbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#1b1b1b;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
    cursor:pointer;
}

.deleteBtn{
    width:100%;
    border-radius:0;
    background:#ff2d55;
}

.title{
    font-size:30px;
    margin-bottom:10px;
}

.info{
    color:#999;
    margin-bottom:20px;
}

.folderCard{
    padding:40px;
    text-align:center;
    font-size:22px;
    cursor:pointer;
}

.backBtn{
    margin-bottom:20px;
}

.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.modal img{
    max-width:95%;
    max-height:85%;
    border-radius:10px;
}

.slideControls{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

</style>
</head>
<body>

<div class="login" id="loginBox">

    <h1>Private Gallery</h1>

    <input 
        type="password" 
        id="password" 
        placeholder="輸入密碼"
    >

    <button onclick="login()">
        進入
    </button>

</div>

<div class="gallery" id="galleryBox">

    <div class="title">
        Private Gallery
    </div>

    <div class="info">
        ImgBB 雲端私密相簿
    </div>

    <button 
        class="backBtn"
        onclick="loadFolders()"
    >
        返回資料夾
    </button>

    <div class="topbar">

        <input 
            type="file" 
            id="upload" 
            accept="image/*"
            multiple
        >

        <button onclick="uploadImage()">
            上傳圖片
        </button>

        <button onclick="createFolder()">
            建立資料夾
        </button>

    </div>

    <div class="grid" id="grid"></div>

</div>

<div class="modal" id="imageModal">

    <img id="modalImage">

    <div class="slideControls">

        <button onclick="closeModal()">
            關閉
        </button>

        <button onclick="startSlideshow()">
            自動播放
        </button>

        <button onclick="stopSlideshow()">
            停止播放
        </button>

        <input 
            type="number"
            id="slideTime"
            value="3"
            min="1"
        >

        <select id="slideMode">

            <option value="loop">
                固定循環
            </option>

            <option value="random">
                隨機循環
            </option>

        </select>

    </div>

</div>

<script>

// ===== 通關密碼 =====
const SITE_PASSWORD = "9872376832";

// ===== ImgBB API KEY =====
const API_KEY = "03281f0e429426c67875d5054df0412a";

// ===== 目前資料夾 =====
let currentFolder = "";

// ===== 播放 =====
let slideshowInterval;
let slideshowIndex = 0;

// ===== 登入 =====
function login(){

    const pass = document
        .getElementById("password")
        .value;

    if(pass === SITE_PASSWORD){

        document
            .getElementById("loginBox")
            .style.display = "none";

        document
            .getElementById("galleryBox")
            .style.display = "block";

        loadFolders();

    }else{

        alert("密碼錯誤");

    }

}

// ===== 建立資料夾 =====
function createFolder(){

    const folder = prompt("輸入資料夾名稱");

    if(!folder) return;

    let folders = JSON.parse(
        localStorage.getItem("folders")
    ) || {};

    if(!folders[folder]){
        folders[folder] = [];
    }

    localStorage.setItem(
        "folders",
        JSON.stringify(folders)
    );

    loadFolders();

}

// ===== 載入資料夾 =====
function loadFolders(){

    currentFolder = "";

    const grid = document
        .getElementById("grid");

    grid.innerHTML = "";

    let folders = JSON.parse(
        localStorage.getItem("folders")
    ) || {};

    Object.keys(folders).forEach(folder=>{

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <div 
                class="folderCard"
                onclick="openFolder('${folder}')"
            >
                📁 ${folder}
            </div>
        `;

        grid.appendChild(card);

    });

}

// ===== 開啟資料夾 =====
function openFolder(folder){

    currentFolder = folder;

    const grid = document
        .getElementById("grid");

    grid.innerHTML = "";

    let folders = JSON.parse(
        localStorage.getItem("folders")
    ) || {};

    let images = folders[folder] || [];

    images.forEach((url,index)=>{

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <img 
                src="${url}"
                onclick="openModal('${url}')"
            >

            <button 
                class="deleteBtn"
                onclick="deleteImage(${index})"
            >
                刪除
            </button>
        `;

        grid.appendChild(card);

    });

}

// ===== 上傳圖片 =====
async function uploadImage(){

    if(currentFolder === ""){

        alert("請先進入資料夾");

        return;

    }

    const files = document
        .getElementById("upload")
        .files;

    if(files.length === 0){

        alert("請選擇圖片");

        return;

    }

    let folders = JSON.parse(
        localStorage.getItem("folders")
    ) || {};

    if(!folders[currentFolder]){
        folders[currentFolder] = [];
    }

    for(let file of files){

        const formData = new FormData();

        formData.append("image", file);

        try{

            const response = await fetch(
                `https://api.imgbb.com/1/upload?key=${API_KEY}`,
                {
                    method:"POST",
                    body:formData
                }
            );

            const data = await response.json();

            if(data.success){

                folders[currentFolder].unshift(
                    data.data.url
                );

            }

        }catch(err){

            console.error(err);

        }

    }

    localStorage.setItem(
        "folders",
        JSON.stringify(folders)
    );

    openFolder(currentFolder);

    alert("上傳成功");

}

// ===== 刪除圖片 =====
function deleteImage(index){

    let folders = JSON.parse(
        localStorage.getItem("folders")
    ) || {};

    folders[currentFolder].splice(index,1);

    localStorage.setItem(
        "folders",
        JSON.stringify(folders)
    );

    openFolder(currentFolder);

}

// ===== 放大圖片 =====
function openModal(url){

    document
        .getElementById("imageModal")
        .style.display = "flex";

    document
        .getElementById("modalImage")
        .src = url;

}

// ===== 關閉 =====
function closeModal(){

    stopSlideshow();

    document
        .getElementById("imageModal")
        .style.display = "none";

}

// ===== 停止播放 =====
function stopSlideshow(){

    clearInterval(slideshowInterval);

}

// ===== 自動播放 =====
function startSlideshow(){

    stopSlideshow();

    let folders = JSON.parse(
        localStorage.getItem("folders")
    ) || {};

    let images = folders[currentFolder] || [];

    if(images.length === 0){

        alert("沒有圖片");

        return;

    }

    let seconds = parseInt(
        document.getElementById("slideTime").value
    );

    let mode = document
        .getElementById("slideMode")
        .value;

    slideshowIndex = 0;

    openModal(images[slideshowIndex]);

    slideshowInterval = setInterval(()=>{

        if(mode === "random"){

            slideshowIndex = Math.floor(
                Math.random() * images.length
            );

        }else{

            slideshowIndex++;

            if(slideshowIndex >= images.length){
                slideshowIndex = 0;
            }

        }

        openModal(images[slideshowIndex]);

    }, seconds * 1000);

}

</script>

</body>
</html>
